<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FlyMetrics</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background:
                radial-gradient(circle at top left,
                rgba(0,191,255,.15),
                transparent 30%),
                #0a0f1a;

            color: white;
        }

        .login-container {

            width: 420px;

            background: #111827;

            padding: 40px;

            border-radius: 15px;

            border: 1px solid rgba(0,191,255,.2);

            box-shadow: 0 0 30px rgba(0,0,0,.3);
        }

        .logo {

            text-align: center;

            color: #00bfff;

            font-size: 32px;

            font-weight: bold;

            margin-bottom: 30px;
        }

        h2 {

            text-align: center;

            margin-bottom: 10px;
        }

        p {

            text-align: center;

            color: #c7c7c7;

            margin-bottom: 25px;
        }

        .input-group {

            margin-bottom: 18px;
        }

        label {

            display: block;

            margin-bottom: 8px;
        }

        input {

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 8px;

            background: #1f2937;

            color: white;
        }

        input:focus {

            outline: 2px solid #00bfff;
        }

        button {

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 8px;

            background: #00bfff;

            color: black;

            font-weight: bold;

            cursor: pointer;

            margin-top: 10px;
        }

        button:hover {

            opacity: .9;
        }

        .links {

            margin-top: 20px;

            display: flex;

            justify-content: space-between;
        }

        .links a {

            color: #00bfff;

            text-decoration: none;

            font-size: 14px;
        }

    </style>

</head>
<body>

    <div class="login-container">

        <div class="logo">
            FLYMETRICS
        </div>

        <h2>Iniciar Sesión</h2>

        <p>
            Ingresa tus credenciales para acceder.
        </p>

        <form id="loginForm">

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input
                    type="email"
                    id="email"
                    required
                >
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input
                    type="password"
                    id="password"
                    required
                >
            </div>

            <button type="submit">
                Ingresar
            </button>

        </form>

        <div class="links">
            <a href="forgot-password.html">
                ¿Olvidaste tu contraseña?
            </a>

            <a href="register.html">
                Registrarse
            </a>
        </div>

    </div>

    <script>

        const form = document.getElementById("loginForm");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {

                const response = await fetch(
                    "http://localhost:8000/login",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            email,
                            password
                        })
                    }
                );

                const data = await response.json();

                if (response.ok) {

                    alert("Bienvenido");

                    localStorage.setItem(
                        "token",
                        data.access_token
                    );

                    window.location.href = "dashboard.html";

                } else {

                    alert(data.detail);
                }

            } catch {

                alert("Error conectando con el servidor");
            }

        });

    </script>

</body>
</html>
